{% extends "base.html" %}

{% block title %}Upload File{% endblock %}

{% block content %}
<h1>Upload a File</h1>
<p>Supported file types: <strong>.txt, .pdf, .wav</strong></p>
<form method="POST" action="http://127.0.0.1:5001/upload" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit" class="btn">Upload</button>
</form>

<!-- Feedback de mensagens -->
{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="flash-message flash-success">
            {{ messages[0] }}
        </div>
    {% endif %}
{% endwith %}
{% endblock %}
