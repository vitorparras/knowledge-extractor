{% extends "base.html" %}

{% block title %}Results{% endblock %}

{% block content %}
<h1>Processing Results</h1>
<div id="results-container">
    <h2>Results</h2>
    <pre id="results-output">
        {% if results %}
        {{ results | tojson(indent=2) }}
        {% else %}
        No results available.
        {% endif %}
    </pre>
</div>

<a href="/" class="btn">Back to Upload</a>
{% endblock %}
