version: "3.9"
services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/venv  # Exclui o ambiente virtual para evitar conflitos
    environment:
      - FLASK_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"